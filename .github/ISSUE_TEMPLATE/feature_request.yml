name: Feature Request
description: Suggest a new script or improvement
labels: [enhancement]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New script
        - Enhancement to existing script
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: script
    attributes:
      label: Related script
      options:
        - nextdns_sync.py
        - docker_aliases.sh
        - tmux_session_picker.sh
        - .bash_aliases
        - Other / New
        - N/A
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Why is this needed?
    validations:
      required: true
