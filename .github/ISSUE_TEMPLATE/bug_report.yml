name: Bug Report
description: Report a bug with a script
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Fill out all required fields.** Incomplete reports will be closed.
  - type: dropdown
    id: script
    attributes:
      label: Script
      options:
        - nextdns_sync.py
        - docker_aliases.sh
        - tmux_session_picker.sh
        - .bash_aliases
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (Debian/Ubuntu)
        - Linux (RHEL/Fedora)
        - Linux (other)
        - macOS
    validations:
      required: true
  - type: input
    id: shell-version
    attributes:
      label: Shell version
      description: "Output of: bash --version | head -1 (or zsh --version)"
      placeholder: "GNU bash, version 5.2.15(1)-release"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste the full error output.
      render: text
    validations:
      required: true
