name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".bash_aliases"
  pull_request:
    paths:
      - "**/*.sh"
      - ".bash_aliases"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

permissions:
  contents: read
